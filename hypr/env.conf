# ############ Wayland #############
env = ELECTRON_OZONE_PLATFORM_HINT,auto

######### Applications #########
env = XDG_DATA_DIRS,$HOME/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share:/usr/local/share:/usr/share

# ############ Themes #############
env = QT_QPA_PLATFORM, wayland;xcb
env = QT_QPA_PLATFORMTHEME, kde
env = XDG_MENU_PREFIX, plasma-

# ######## Terminal application #########
env = TERMINAL,kitty -1


# ######## Wayland #########
# Tearing
env = WLR_DRM_NO_ATOMIC, 1
env = WLR_NO_HARDWARE_CURSORS, 1

env = XCURSOR_THEME, breeze_cursors
env = XCURSOR_SIZE, 24
env = HYPRCURSOR_THEME, breeze_cursors
env = HYPRCURSOR_SIZE, 24

env = __NV_DISABLE_EXPLICIT_SYNC,1
env = NVD_BACKEND,direct
env = LIBVA_DRIVER_NAME,nvidia
env = MOZ_ENABLE_WAYLAND,1
env = __NV_PRIME_RENDER_OFFLOAD,1
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __VK_LAYER_NV_optimus,NVIDIA_only
